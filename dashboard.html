<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Salón · Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d0d14;color:#f1f0ec;min-height:100vh}
.topbar{background:#13131f;border-bottom:1px solid rgba(255,255,255,0.06);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:12px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#c084fc,#e879f9);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px}
.page-title{font-size:15px;font-weight:600;color:#f1f0ec}
.topbar-right{display:flex;align-items:center;gap:8px}
.user-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.05);padding:4px 10px;border-radius:99px}
.user-dot{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#c084fc,#e879f9);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.user-name{font-size:12px;color:#9ca3af}
.logout-btn{background:transparent;border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:5px 10px;font-size:12px;color:#6b7280;cursor:pointer}
/* Nav */
.nav-bar{background:#13131f;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;overflow-x:auto;scrollbar-width:none}
.nav-bar::-webkit-scrollbar{display:none}
.nav-tab{padding:12px 18px;font-size:13px;color:#6b7280;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.nav-tab:hover{color:#9ca3af}
.nav-tab.activo{color:#c084fc;border-bottom-color:#c084fc}
/* Acciones rápidas */
.acciones{display:flex;gap:8px;padding:16px;overflow-x:auto;scrollbar-width:none}
.accion-btn{display:flex;align-items:center;gap:8px;background:#13131f;border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:12px 16px;text-decoration:none;color:#f1f0ec;font-size:13px;font-weight:500;white-space:nowrap;cursor:pointer;transition:all .15s}
.accion-btn:hover{border-color:rgba(192,132,252,0.3);background:rgba(192,132,252,0.05)}
.accion-btn .ico{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
/* Contenido de tabs */
.tab-content{display:none;padding:16px}
.tab-content.activo{display:block}
/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}
@media(min-width:600px){.kpis{grid-template-columns:repeat(4,1fr)}}
.kpi{background:#13131f;border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:16px}
.kpi-label{font-size:11px;color:#6b7280;margin-bottom:8px;font-weight:500}
.kpi-val{font-size:26px;font-weight:700;letter-spacing:-.02em}
.kpi-sub{font-size:11px;color:#4b5563;margin-top:4px}
/* Tabla de citas */
.section-title{font-size:13px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.cita-row{display:flex;align-items:center;background:#13131f;border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px 14px;margin-bottom:8px;gap:12px;cursor:pointer;transition:border-color .15s}
.cita-row:hover{border-color:rgba(192,132,252,0.25)}
.cita-hora-badge{width:52px;text-align:center;flex-shrink:0}
.chr-ini{font-size:14px;font-weight:600;color:#f1f0ec}
.chr-fin{font-size:10px;color:#4b5563}
.cita-info{flex:1;min-width:0}
.ci-cliente{font-size:13px;font-weight:600;color:#f1f0ec;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-servicios{font-size:11px;color:#6b7280;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-estilista{font-size:11px;font-weight:500;margin-top:3px}
.cita-right{text-align:right;flex-shrink:0}
.cr-precio{font-size:13px;font-weight:600;color:#a78bfa}
.cr-estado{font-size:10px;padding:2px 8px;border-radius:99px;margin-top:4px;display:inline-block}
.estado-pendiente{background:rgba(234,179,8,0.15);color:#fbbf24}
.estado-confirmada{background:rgba(74,222,128,0.1);color:#4ade80}
.estado-en_proceso{background:rgba(96,165,250,0.1);color:#60a5fa}
.estado-completada{background:rgba(167,139,250,0.1);color:#a78bfa}
.estado-cancelada{background:rgba(239,68,68,0.1);color:#f87171}
.empty-state{text-align:center;padding:48px 20px;color:#374151;font-size:14px}
/* Métricas de pagos */
.pagos-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
@media(min-width:500px){.pagos-grid{grid-template-columns:repeat(3,1fr)}}
.pago-card{background:#13131f;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:14px}
.pago-metodo{font-size:12px;color:#6b7280;margin-bottom:6px}
.pago-val{font-size:18px;font-weight:700;color:#4ade80}
.pago-cant{font-size:11px;color:#4b5563;margin-top:3px}
/* Historial de pagos */
.pago-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.pago-row:last-child{border-bottom:none}
.pr-left .pr-cliente{font-size:13px;font-weight:500;color:#f1f0ec}
.pr-left .pr-meta{font-size:11px;color:#4b5563;margin-top:2px}
.pr-right .pr-val{font-size:14px;font-weight:600;color:#4ade80}
.pr-right .pr-mp{font-size:11px;color:#6b7280;margin-top:2px;text-align:right}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo-icon">💇</div>
    <span class="page-title">Salón de Belleza</span>
  </div>
  <div class="topbar-right">
    <div class="user-pill">
      <div class="user-dot" id="userInitial">?</div>
      <span class="user-name" id="userName">...</span>
    </div>
    <button class="logout-btn" onclick="sessionStorage.clear();location.href='index.html'">Salir</button>
  </div>
</div>

<!-- Acciones rápidas -->
<div class="acciones">
  <a href="agendar.html" class="accion-btn"><div class="ico" style="background:rgba(192,132,252,0.15)">✦</div>Nueva cita</a>
  <a href="calendario.html" class="accion-btn"><div class="ico" style="background:rgba(96,165,250,0.15)">📅</div>Calendario</a>
  <a href="clientes.html" class="accion-btn"><div class="ico" style="background:rgba(74,222,128,0.15)">👤</div>Clientes</a>
  <a href="servicios.html" class="accion-btn"><div class="ico" style="background:rgba(251,191,36,0.15)">✂️</div>Servicios</a>
  <a href="admin.html" class="accion-btn" id="linkAdmin" style="display:none"><div class="ico" style="background:rgba(239,68,68,0.15)">⚙️</div>Admin</a>
</div>

<!-- Tabs -->
<div class="nav-bar">
  <div class="nav-tab activo" onclick="cambiarTab('hoy')">Hoy</div>
  <div class="nav-tab" onclick="cambiarTab('mes')">Este mes</div>
  <div class="nav-tab" onclick="cambiarTab('pagos')">Pagos</div>
</div>

<!-- Tab Hoy -->
<div class="tab-content activo" id="tab-hoy">
  <div class="kpis" id="kpisHoy"></div>
  <div class="section-title">Citas de hoy</div>
  <div id="citasHoy"></div>
</div>

<!-- Tab Mes -->
<div class="tab-content" id="tab-mes">
  <div class="kpis" id="kpisMes"></div>
  <div class="section-title">Citas del mes por estado</div>
  <div id="citasMes"></div>
</div>

<!-- Tab Pagos -->
<div class="tab-content" id="tab-pagos">
  <div class="section-title">Ingresos por método de pago — Hoy</div>
  <div class="pagos-grid" id="pagosMetodoHoy"></div>
  <div class="section-title" style="margin-top:16px">Últimos pagos registrados</div>
  <div id="ultimosPagos"></div>
</div>

<script>
  const SUPABASE_URL = 'https://leuvcsfbzzlhvyedzplj.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxldXZjc2ZienpsaHZ5ZWR6cGxqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNzI4NDMsImV4cCI6MjA5MDY0ODg0M30.7kxn3mbwJRhC5t6aAwx6OPGwA6_t7pwf1ZyzW-VAY5w';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ── Fecha/hora en zona horaria Colombia (UTC-5) ──────────────────
  function ahoraColombia() {
    const ahora = new Date();
    // Colombia siempre UTC-5, sin cambio de horario
    const col = new Date(ahora.getTime() - 5 * 60 * 60 * 1000);
    const ymd = col.toISOString().slice(0, 10);          // "2025-04-03"
    const ym  = ymd.slice(0, 7);                         // "2025-04"
    const hm  = col.toISOString().slice(11, 16);         // "14:32"
    return { fecha: ymd, mes: ym, hora: hm };
  }

  let session = null;
  const { fecha: HOY, mes: MES_ACTUAL } = ahoraColombia();
  const ESTADO_COLOR = {
    pendiente:'estado-pendiente', confirmada:'estado-confirmada',
    en_proceso:'estado-en_proceso', completada:'estado-completada',
    cancelada:'estado-cancelada'
  };

  window.addEventListener('load', async () => {
    const raw = sessionStorage.getItem('salon_user');
    if (!raw) { window.location.href = 'index.html'; return; }
    session = JSON.parse(raw);
    document.getElementById('userName').textContent    = session.nombre;
    document.getElementById('userInitial').textContent = session.nombre.charAt(0).toUpperCase();
    if (session.rol === 'admin') document.getElementById('linkAdmin').style.display = 'flex';
    await cargarHoy();
  });

  // ── Tabs ─────────────────────────────────────────────────────────
  function cambiarTab(tab) {
    // Marcar tab activo buscando por atributo onclick
    document.querySelectorAll('.nav-tab').forEach(t => {
      t.classList.toggle('activo', t.getAttribute('onclick') === `cambiarTab('${tab}')`);
    });
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('activo'));
    document.getElementById('tab-' + tab).classList.add('activo');
    if      (tab === 'hoy')   cargarHoy();
    else if (tab === 'mes')   cargarMes();
    else                      cargarPagos();
  }

  // ── Tab Hoy ───────────────────────────────────────────────────────
  async function cargarHoy() {
    const { data: citas } = await sb.from('citas')
      .select('*,cita_servicios(nombre_servicio,precio_unitario),estilistas(nombre,color),pagos(valor_cobrado,metodo_pago)')
      .eq('fecha', HOY).order('hora_inicio');

    const total       = (citas||[]).length;
    const completadas = (citas||[]).filter(c => c.estado === 'completada').length;
    const pendientes  = (citas||[]).filter(c => c.estado === 'pendiente' || c.estado === 'confirmada').length;
    const ingresos    = (citas||[]).reduce((s, c) => {
      const p = c.pagos?.[0]; return s + (p ? parseFloat(p.valor_cobrado) : 0);
    }, 0);

    document.getElementById('kpisHoy').innerHTML = `
      <div class="kpi"><div class="kpi-label">Citas hoy</div><div class="kpi-val" style="color:#60a5fa">${total}</div></div>
      <div class="kpi"><div class="kpi-label">Pendientes</div><div class="kpi-val" style="color:#fbbf24">${pendientes}</div></div>
      <div class="kpi"><div class="kpi-label">Completadas</div><div class="kpi-val" style="color:#4ade80">${completadas}</div></div>
      <div class="kpi"><div class="kpi-label">Ingresos hoy</div><div class="kpi-val" style="color:#a78bfa">$${ingresos.toLocaleString('es-CO')}</div><div class="kpi-sub">pagos registrados</div></div>`;

    const cont = document.getElementById('citasHoy');
    if (!citas || !citas.length) {
      cont.innerHTML = '<div class="empty-state">No hay citas para hoy</div>'; return;
    }
    cont.innerHTML = citas.map(c => {
      const servicios = (c.cita_servicios||[]).map(s => s.nombre_servicio).join(', ');
      const totalC    = (c.cita_servicios||[]).reduce((s, x) => s + parseFloat(x.precio_unitario), 0);
      return `<div class="cita-row" onclick="window.location.href='calendario.html'">
        <div class="cita-hora-badge">
          <div class="chr-ini">${c.hora_inicio?.slice(0,5)}</div>
          <div class="chr-fin">${c.hora_fin?.slice(0,5)}</div>
        </div>
        <div class="cita-info">
          <div class="ci-cliente">${c.cliente_nombre}</div>
          <div class="ci-servicios">${servicios||'—'}</div>
          <div class="ci-estilista" style="color:${c.estilistas?.color||'#c084fc'}">${c.estilistas?.nombre||'—'}</div>
        </div>
        <div class="cita-right">
          <div class="cr-precio">$${totalC.toLocaleString('es-CO')}</div>
          <div class="cr-estado ${ESTADO_COLOR[c.estado]||''}">${traducirEstado(c.estado)}</div>
        </div>
      </div>`;
    }).join('');
  }

  // ── Tab Mes ───────────────────────────────────────────────────────
  async function cargarMes() {
    // Calcular primer y último día del mes actual Colombia
    const [y, m] = MES_ACTUAL.split('-').map(Number);
    const primerDia = `${MES_ACTUAL}-01`;
    const ultimoDia = new Date(y, m, 0).toISOString().slice(0, 10); // último día real del mes

    // Citas del mes
    const { data: citas } = await sb.from('citas')
      .select('id,estado,cita_servicios(precio_unitario)')
      .gte('fecha', primerDia).lte('fecha', ultimoDia);

    // Pagos del mes (consulta directa a tabla pagos por fecha)
    const { data: pagosMes } = await sb.from('pagos')
      .select('valor_cobrado,metodo_pago')
      .gte('fecha', primerDia).lte('fecha', ultimoDia);

    const total       = (citas||[]).length;
    const completadas = (citas||[]).filter(c => c.estado === 'completada').length;
    const canceladas  = (citas||[]).filter(c => c.estado === 'cancelada').length;
    const pendientes  = (citas||[]).filter(c => c.estado === 'pendiente' || c.estado === 'confirmada').length;
    const ingresos    = (pagosMes||[]).reduce((s, p) => s + parseFloat(p.valor_cobrado), 0);

    const mesesNombre = ['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    document.getElementById('kpisMes').innerHTML = `
      <div class="kpi"><div class="kpi-label">Total citas — ${mesesNombre[m]}</div><div class="kpi-val" style="color:#60a5fa">${total}</div></div>
      <div class="kpi"><div class="kpi-label">Completadas</div><div class="kpi-val" style="color:#4ade80">${completadas}</div></div>
      <div class="kpi"><div class="kpi-label">Canceladas</div><div class="kpi-val" style="color:#f87171">${canceladas}</div></div>
      <div class="kpi"><div class="kpi-label">Ingresos ${mesesNombre[m]}</div><div class="kpi-val" style="color:#a78bfa">$${ingresos.toLocaleString('es-CO')}</div><div class="kpi-sub">pagos registrados</div></div>`;

    // Desglose por estado
    const estados  = ['pendiente','confirmada','en_proceso','completada','cancelada','no_show'];
    const NOMBRES  = {pendiente:'⏳ Pendiente',confirmada:'✅ Confirmada',en_proceso:'⚡ En proceso',completada:'✔ Completada',cancelada:'✕ Cancelada',no_show:'👻 No asistió'};
    const itemsMes = estados.map(e => {
      const cnt = (citas||[]).filter(c => c.estado === e).length;
      if (!cnt) return '';
      return `<div class="cita-row">
        <div class="cita-info"><div class="ci-cliente">${NOMBRES[e]}</div></div>
        <div class="cita-right"><div class="cr-precio">${cnt} cita${cnt!==1?'s':''}</div></div>
      </div>`;
    }).join('');

    // Desglose de ingresos por método de pago del mes
    const porMetodoMes = {};
    (pagosMes||[]).forEach(p => {
      if (!porMetodoMes[p.metodo_pago]) porMetodoMes[p.metodo_pago] = { total:0, cnt:0 };
      porMetodoMes[p.metodo_pago].total += parseFloat(p.valor_cobrado);
      porMetodoMes[p.metodo_pago].cnt++;
    });
    const ICOS = {'Efectivo':'💵','Nequi':'📱','Daviplata':'📲','Transferencia':'🏦','Tarjeta débito':'💳','Tarjeta crédito':'💳'};
    const metodosHtml = Object.entries(porMetodoMes).length
      ? `<div class="section-title" style="margin-top:20px">Ingresos por método — ${mesesNombre[m]}</div>
         <div class="pagos-grid">${Object.entries(porMetodoMes).map(([met, v]) =>
           `<div class="pago-card">
              <div class="pago-metodo">${ICOS[met]||'💰'} ${met}</div>
              <div class="pago-val">$${v.total.toLocaleString('es-CO')}</div>
              <div class="pago-cant">${v.cnt} pago${v.cnt!==1?'s':''}</div>
            </div>`).join('')}</div>`
      : '';

    document.getElementById('citasMes').innerHTML = (itemsMes || '<div class="empty-state">Sin citas este mes</div>') + metodosHtml;
  }

  // ── Tab Pagos ─────────────────────────────────────────────────────
  async function cargarPagos() {
    // Pagos de hoy — consulta directa por fecha Colombia
    const { data: pagosHoy } = await sb.from('pagos')
      .select('*, citas(cliente_nombre, estilistas(nombre))')
      .eq('fecha', HOY)
      .order('hora', { ascending: false });

    // Resumen por método
    const porMetodo = {};
    (pagosHoy||[]).forEach(p => {
      if (!porMetodo[p.metodo_pago]) porMetodo[p.metodo_pago] = { total:0, cnt:0 };
      porMetodo[p.metodo_pago].total += parseFloat(p.valor_cobrado);
      porMetodo[p.metodo_pago].cnt++;
    });

    const totalHoy = (pagosHoy||[]).reduce((s, p) => s + parseFloat(p.valor_cobrado), 0);
    const ICOS = {'Efectivo':'💵','Nequi':'📱','Daviplata':'📲','Transferencia':'🏦','Tarjeta débito':'💳','Tarjeta crédito':'💳'};

    // KPI total del día
    document.getElementById('pagosMetodoHoy').innerHTML = Object.entries(porMetodo).length
      ? `<div class="pago-card" style="grid-column:1/-1;background:rgba(167,139,250,0.08);border-color:rgba(167,139,250,0.2)">
           <div class="pago-metodo">💰 Total recaudado hoy</div>
           <div class="pago-val" style="font-size:24px">$${totalHoy.toLocaleString('es-CO')}</div>
           <div class="pago-cant">${(pagosHoy||[]).length} pago${(pagosHoy||[]).length!==1?'s':''}</div>
         </div>
         ${Object.entries(porMetodo).map(([m,v]) =>
           `<div class="pago-card">
              <div class="pago-metodo">${ICOS[m]||'💰'} ${m}</div>
              <div class="pago-val">$${v.total.toLocaleString('es-CO')}</div>
              <div class="pago-cant">${v.cnt} pago${v.cnt!==1?'s':''}</div>
            </div>`).join('')}`
      : '<p style="color:#4b5563;font-size:13px;padding:8px 0">Sin pagos registrados hoy</p>';

    document.getElementById('ultimosPagos').innerHTML = (pagosHoy||[]).length
      ? pagosHoy.slice(0, 20).map(p => `
          <div class="pago-row">
            <div class="pr-left">
              <div class="pr-cliente">${p.citas?.cliente_nombre||'—'}</div>
              <div class="pr-meta">${p.hora?.slice(0,5)||''} · ${p.citas?.estilistas?.nombre||''}</div>
            </div>
            <div class="pr-right">
              <div class="pr-val">$${parseInt(p.valor_cobrado).toLocaleString('es-CO')}</div>
              <div class="pr-mp">${p.metodo_pago}</div>
            </div>
          </div>`).join('')
      : '<div class="empty-state">Sin pagos hoy</div>';
  }

  function traducirEstado(e) {
    return {pendiente:'Pendiente',confirmada:'Confirmada',en_proceso:'En proceso',completada:'Completada',cancelada:'Cancelada',no_show:'No asistió'}[e]||e;
  }
</script>
</body>
</html>
